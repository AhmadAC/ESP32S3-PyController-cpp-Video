[env:pyController_esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.42
    bitbank2/JPEGDEC @ ^1.3.1
    hpsaturn/EspNowCam @ ^0.2.1

build_flags =
    -D USER_SETUP_LOADED=1
    -D ST7789_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=240
    -D TFT_MOSI=41
    -D TFT_SCLK=40
    -D TFT_CS=39
    -D TFT_DC=38
    -D TFT_RST=42
    -D LOAD_GLCD=1
    -D SPI_FREQUENCY=40000000
    -D BOARD_HAS_PSRAM=0
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D CORE_DEBUG_LEVEL=0