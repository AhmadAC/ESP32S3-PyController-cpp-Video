# .github\workflows\build-cpp.yml
name: Build C++ Firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build Firmware
        run: pio run

      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pyController-S3-Binaries
          path: |
            .pio/build/pyController_esp32s3/firmware.bin
            .pio/build/pyController_esp32s3/bootloader.bin
            .pio/build/pyController_esp32s3/partitions.bin