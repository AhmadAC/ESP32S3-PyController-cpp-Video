name: Build C++ Firmware

on:
  push:
    branches: [ restart, master ]
  pull_request:
    branches: [ restart, master ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Firmware and Merge Binaries
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3.1
          target: esp32s3
          # Run the build and the esptool merge inside the ESP-IDF container
          # Note: Since FLASH_IN_PROJECT is used in CMakeLists.txt, idf.py build automatically 
          # builds spiffs.bin and adds it to flash_args.
          command: 'idf.py build && cd build && esptool.py --chip esp32s3 merge_bin -o merged-pycontroller-s3.bin --fill-flash-size 4MB @flash_args'

      - name: Upload Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyController-S3-CPP-Merged
          path: build/merged-pycontroller-s3.bin