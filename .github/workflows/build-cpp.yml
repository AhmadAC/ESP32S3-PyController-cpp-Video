name: Build C++ Firmware

on:
  push:
    branches: [ main2, master ]
  pull_request:
    branches: [ main2, master ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3.1
          target: esp32s3
          command: |
            # 1. Standard build
            idf.py build
            
            # 2. Install esptool
            pip install esptool
            
            # 3. Enter the build directory so the paths inside flash_args resolve correctly
            cd build
            
            # 4. Run merge_bin using the auto-generated flash_args file
            python -m esptool --chip esp32s3 merge_bin -o merged-pycontroller-s3.bin --fill-flash-size 4MB @flash_args

      - name: Upload Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyController-S3-CPP-Merged
          # Path remains build/ because we created the file inside the build folder in the previous step
          path: build/merged-pycontroller-s3.bin
