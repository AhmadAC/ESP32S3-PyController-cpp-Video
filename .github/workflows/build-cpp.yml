name: Build C++ Firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3.1
          target: esp32s3
          command: |
            idf.py build
            pip install esptool
            # Use the generated flasher_args.json to create a single merged binary
            python -m esptool --chip esp32s3 merge_bin -o build/merged-pycontroller-s3.bin --fill-flash-size 4MB @build/flash_args

      - name: Upload Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyController-S3-CPP-Merged
          path: build/merged-pycontroller-s3.bin
